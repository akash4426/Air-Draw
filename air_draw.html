<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air Drawer - Neon Hand Gesture Drawing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .canvas-section {
            flex: 1;
            min-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        #canvas {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #0a0a14;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3),
                        0 0 60px rgba(255, 0, 255, 0.2),
                        inset 0 0 20px rgba(0, 0, 0, 0.8);
            cursor: crosshair;
            display: block;
        }

        #video {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 15px;
            display: none;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .controls-section {
            width: 300px;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        input[type="color"] {
            width: 100%;
            height: 50px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 8px;
            cursor: pointer;
            background: rgba(0, 255, 255, 0.1);
        }

        input[type="color"]:hover {
            border-color: rgba(0, 255, 255, 0.6);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #00ffff, #0088ff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.5);
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            background: radial-gradient(circle, #00ffff, #0088ff);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.8);
            border: 2px solid rgba(0, 255, 255, 0.5);
        }

        .value-display {
            text-align: center;
            font-size: 14px;
            color: #00ffff;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #00ffff 0%, #0088ff 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
        }

        button:hover {
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.8),
                        inset 0 0 15px rgba(0, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: translateY(0);
        }

        .status-panel {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            font-size: 12px;
            line-height: 1.8;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .status-label {
            color: #888;
        }

        .status-value {
            color: #00ffff;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        .gesture-indicator {
            width: 100%;
            height: 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(0, 255, 255, 0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 600;
            color: #00ffff;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .gesture-indicator.drawing {
            border-color: #00ff88;
            background: rgba(0, 255, 136, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(0, 255, 136, 0.3);
            animation: pulse 0.5s ease-in-out infinite;
        }

        .gesture-indicator.erasing {
            border-color: #ff00ff;
            background: rgba(255, 0, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 0, 255, 0.3);
            animation: pulse 0.5s ease-in-out infinite;
        }

        .gesture-indicator.paused {
            border-color: #ffaa00;
            background: rgba(255, 170, 0, 0.1);
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8), 0 0 15px rgba(255, 170, 0, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .info-panel {
            background: rgba(0, 136, 255, 0.05);
            border: 1px solid rgba(0, 136, 255, 0.2);
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
            line-height: 1.6;
            color: #aaa;
        }

        .info-title {
            color: #0088ff;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .info-item {
            margin: 4px 0;
        }

        .shortcut-key {
            display: inline-block;
            background: rgba(0, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            color: #00ffff;
            font-size: 10px;
        }

        @media (max-width: 1000px) {
            .container {
                flex-direction: column;
            }

            .canvas-section {
                min-width: auto;
            }

            .controls-section {
                width: 100%;
                max-width: 600px;
                margin: 0 auto;
            }
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 14, 39, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            z-index: 1000;
            border: 2px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 255, 255, 0.2);
            border-top: 3px solid #00ffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .neon-text {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8),
                         0 0 20px rgba(0, 255, 255, 0.6);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="neon-text">Loading MediaPipe...</div>
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-size: 12px; color: #888;">Initializing hand detection</p>
    </div>

    <div class="container">
        <div class="canvas-section">
            <canvas id="canvas"></canvas>
            <video id="video" playsinline></video>
        </div>

        <div class="controls-section">
            <div style="text-align: center; padding-bottom: 10px; border-bottom: 1px solid rgba(0, 255, 255, 0.2);">
                <h1 style="font-size: 18px; color: #00ffff; text-shadow: 0 0 10px rgba(0, 255, 255, 0.5); letter-spacing: 2px;">
                    AIR DRAWER
                </h1>
            </div>

            <div class="gesture-indicator" id="gestureIndicator">READY</div>

            <div class="control-group">
                <label for="colorPicker">Neon Color</label>
                <input type="color" id="colorPicker" value="#00ffff">
            </div>

            <div class="control-group">
                <label for="brushSize">Brush Size</label>
                <input type="range" id="brushSize" min="2" max="50" value="8">
                <div class="value-display" id="brushValue">8px</div>
            </div>

            <div class="button-group">
                <button id="clearBtn">Clear Canvas</button>
                <button id="downloadBtn">Download Drawing</button>
            </div>

            <div class="status-panel">
                <div class="status-item">
                    <span class="status-label">Hand Detected:</span>
                    <span class="status-value" id="handStatus">No</span>
                </div>
                <div class="status-item">
                    <span class="status-label">Mode:</span>
                    <span class="status-value" id="modeStatus">Idle</span>
                </div>
                <div class="status-item">
                    <span class="status-label">FPS:</span>
                    <span class="status-value" id="fpsStatus">0</span>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-title">🖐️ Gestures</div>
                <div class="info-item">
                    <span class="shortcut-key">☝️ ONE FINGER</span> = Draw
                </div>
                <div class="info-item">
                    <span class="shortcut-key">✋ OPEN PALM</span> = Erase
                </div>
                <div class="info-item">
                    <span class="shortcut-key">✊ CLOSED FIST</span> = Pause
                </div>
                <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(0, 136, 255, 0.2);">
                    <div class="info-title">⌨️ Controls</div>
                    <div class="info-item">
                        <span class="shortcut-key">C</span> Clear
                    </div>
                    <div class="info-item">
                        <span class="shortcut-key">D</span> Download
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4.1633559619"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1633559619"></script>
    <script async src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.4.1633559619"></script>

    <script>
        // Elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');
        const colorPicker = document.getElementById('colorPicker');
        const brushSize = document.getElementById('brushSize');
        const brushValue = document.getElementById('brushValue');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const gestureIndicator = document.getElementById('gestureIndicator');
        const loading = document.getElementById('loading');

        // State
        let isDrawing = false;
        let isPaused = false;
        let lastX = 0;
        let lastY = 0;
        let currentColor = '#00ffff';
        let currentBrushSize = 8;
        let handDetected = false;
        let frameCount = 0;
        let lastFrameTime = Date.now();
        let fps = 0;

        // Set canvas size
        function resizeCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Initialize canvas with dark background
        function initCanvas() {
            ctx.fillStyle = '#0a0a14';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        initCanvas();

        // Draw with glow effect
        function drawGlowingPoint(x, y, color, size) {
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
            gradient.addColorStop(0, color + '80');
            gradient.addColorStop(0.5, color + '40');
            gradient.addColorStop(1, color + '00');

            ctx.fillStyle = gradient;
            ctx.fillRect(x - size, y - size, size * 2, size * 2);

            // Core bright dot
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, size * 0.4, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawGlowingLine(fromX, fromY, toX, toY, color, size) {
            // Draw glow
            ctx.strokeStyle = color + '30';
            ctx.lineWidth = size * 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            // Draw bright line
            ctx.strokeStyle = color;
            ctx.lineWidth = size;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();

            // Draw highlight
            ctx.strokeStyle = color + 'cc';
            ctx.lineWidth = size * 0.5;
            ctx.beginPath();
            ctx.moveTo(fromX, fromY);
            ctx.lineTo(toX, toY);
            ctx.stroke();
        }

        // Gesture detection
        function getFingerDistance(landmarks, point1, point2) {
            const p1 = landmarks[point1];
            const p2 = landmarks[point2];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        function detectGesture(landmarks) {
            // Finger tip heights
            const indexDist = getFingerDistance(landmarks, 8, 6);
            const middleDist = getFingerDistance(landmarks, 12, 10);
            const ringDist = getFingerDistance(landmarks, 16, 14);
            const pinkyDist = getFingerDistance(landmarks, 20, 18);
            const thumbDist = getFingerDistance(landmarks, 4, 3);

            // Wrist position
            const wrist = landmarks[0];
            const avg = (Math.abs(landmarks[8].y - wrist.y) +
                        Math.abs(landmarks[12].y - wrist.y) +
                        Math.abs(landmarks[16].y - wrist.y) +
                        Math.abs(landmarks[20].y - wrist.y)) / 4;

            // Open palm - all fingers extended
            if (indexDist > 0.08 && middleDist > 0.08 && ringDist > 0.08 && pinkyDist > 0.08) {
                return 'erase';
            }

            // Closed fist - all fingers curled
            if (indexDist < 0.04 && middleDist < 0.04 && ringDist < 0.04 && pinkyDist < 0.04) {
                return 'pause';
            }

            // One finger pointing - only index extended
            if (indexDist > 0.06 && middleDist < 0.05 && ringDist < 0.05 && pinkyDist < 0.05) {
                return 'draw';
            }

            return 'idle';
        }

        // MediaPipe Hands
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1633559619/` + file
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        function onResults(results) {
            handDetected = results.multiHandLandmarks && results.multiHandLandmarks.length > 0;
            document.getElementById('handStatus').textContent = handDetected ? 'Yes' : 'No';

            if (handDetected && !isPaused) {
                const landmarks = results.multiHandLandmarks[0];
                const gesture = detectGesture(landmarks);

                // Get index finger position
                const indexFinger = landmarks[8];
                const x = indexFinger.x * canvas.width;
                const y = indexFinger.y * canvas.height;

                if (gesture === 'draw') {
                    isDrawing = true;
                    gestureIndicator.textContent = '✏️ DRAWING';
                    gestureIndicator.className = 'gesture-indicator drawing';
                    document.getElementById('modeStatus').textContent = 'Drawing';

                    if (lastX !== 0 && lastY !== 0) {
                        drawGlowingLine(lastX, lastY, x, y, currentColor, currentBrushSize);
                    } else {
                        drawGlowingPoint(x, y, currentColor, currentBrushSize);
                    }

                    lastX = x;
                    lastY = y;
                } else if (gesture === 'erase') {
                    isDrawing = false;
                    gestureIndicator.textContent = '🗑️ ERASING';
                    gestureIndicator.className = 'gesture-indicator erasing';
                    document.getElementById('modeStatus').textContent = 'Erasing';

                    // Erase with circular area
                    ctx.clearRect(x - currentBrushSize * 2, y - currentBrushSize * 2,
                                 currentBrushSize * 4, currentBrushSize * 4);

                    lastX = 0;
                    lastY = 0;
                } else if (gesture === 'pause') {
                    isDrawing = false;
                    gestureIndicator.textContent = '⏸️ PAUSED';
                    gestureIndicator.className = 'gesture-indicator paused';
                    document.getElementById('modeStatus').textContent = 'Paused';
                    lastX = 0;
                    lastY = 0;
                } else {
                    isDrawing = false;
                    gestureIndicator.textContent = 'IDLE';
                    gestureIndicator.className = 'gesture-indicator';
                    document.getElementById('modeStatus').textContent = 'Idle';
                    lastX = 0;
                    lastY = 0;
                }
            } else {
                isDrawing = false;
                if (!handDetected) {
                    gestureIndicator.textContent = 'NO HAND DETECTED';
                    gestureIndicator.className = 'gesture-indicator';
                    document.getElementById('modeStatus').textContent = 'Idle';
                }
                lastX = 0;
                lastY = 0;
            }

            // FPS calculation
            frameCount++;
            const now = Date.now();
            if (now - lastFrameTime >= 1000) {
                fps = frameCount;
                frameCount = 0;
                lastFrameTime = now;
                document.getElementById('fpsStatus').textContent = fps;
            }
        }

        // Camera
        const camera = new Camera(video, {
            onFrame: async () => {
                await hands.send({ image: video });
            }
        });

        camera.start();

        // Controls
        colorPicker.addEventListener('change', (e) => {
            currentColor = e.target.value;
        });

        brushSize.addEventListener('input', (e) => {
            currentBrushSize = parseInt(e.target.value);
            brushValue.textContent = currentBrushSize + 'px';
        });

        clearBtn.addEventListener('click', () => {
            initCanvas();
        });

        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = 'air-drawing.png';
            link.href = canvas.toDataURL();
            link.click();
        });

        // Keyboard shortcuts
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'c') {
                initCanvas();
            } else if (e.key.toLowerCase() === 'd') {
                const link = document.createElement('a');
                link.download = 'air-drawing.png';
                link.href = canvas.toDataURL();
                link.click();
            }
        });

        // Hide loading when ready
        setTimeout(() => {
            loading.style.display = 'none';
        }, 1500);
    </script>
</body>
</html>
